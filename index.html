<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة أبو نواف لنمذجة الاختبارات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --border-thickness: 2px; }
        body { font-family: 'Sakkal Majalla', 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; }
        
        /* واجهة الإدخال - لن تظهر في الطباعة */
        .no-print-area { background: #ffffff; padding: 25px; border-bottom: 3px solid #007bff; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex: 1; font-size: 16px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #007bff; color: white; }
        .btn-pdf { background: #28a745; color: white; }
        
        /* تنسيق ورقة الاختبار */
        .page { 
            width: 210mm; min-height: 297mm; padding: 15mm; margin: 10px auto; 
            background: white; box-shadow: 0 0 10px rgba(0,0,0,0.2); 
            box-sizing: border-box; page-break-after: always;
        }
        
        .header-table { width: 100%; border: var(--border-thickness) solid black; border-collapse: collapse; margin-bottom: 15px; }
        .header-table td { border: 1px solid black; padding: 5px; text-align: center; font-weight: bold; font-size: 14pt; }
        
        .questions-grid { display: grid; grid-template-columns: 1fr 1fr; border: var(--border-thickness) solid black; }
        .q-box { border: 1px solid black; padding: 10px; min-height: 80px; box-sizing: border-box; }
        .q-text { font-weight: 900; font-size: 13pt; margin-bottom: 8px; display: block; color: black; }
        
        .options-container { display: grid; grid-template-columns: 1fr 1fr; font-size: 12pt; }
        .option { margin: 2px 0; font-weight: bold; }

        @media print { .no-print-area { display: none; } body { background: none; } .page { box-shadow: none; margin: 0; } }
    </style>
</head>
<body>

    <div class="no-print-area">
        <h2 style="margin-top:0;">إدارة اختبارات ثانوية الأمير عبدالمجيد</h2>
        <div class="input-group">
            <textarea id="qText" placeholder="اكتب السؤال هنا..." rows="2"></textarea>
        </div>
        <div class="input-group">
            <input type="text" id="optA" placeholder="خيار (أ)">
            <input type="text" id="optB" placeholder="خيار (ب)">
            <input type="text" id="optC" placeholder="خيار (ج)">
            <input type="text" id="optD" placeholder="خيار (د)">
        </div>
        <button class="btn-add" onclick="addQuestion()">+ إضافة السؤال</button>
        <button class="btn-pdf" onclick="generatePDF()">حفظ كـ PDF (صفحة لكل 12 سؤال)</button>
        <span id="counter" style="margin-right:20px; font-weight:bold;">عدد الأسئلة: 0</span>
    </div>

    <div id="exam-content">
        </div>

    <script>
        let allQuestions = [];

        function addQuestion() {
            const q = {
                text: document.getElementById('qText').value,
                a: document.getElementById('optA').value,
                b: document.getElementById('optB').value,
                c: document.getElementById('optC').value,
                d: document.getElementById('optD').value
            };
            if(!q.text) return alert("الرجاء كتابة السؤال");
            allQuestions.push(q);
            updateView();
            // تفريغ الحقول
            document.querySelectorAll('.no-print-area input, .no-print-area textarea').forEach(el => el.value = '');
            document.getElementById('counter').innerText = `عدد الأسئلة: ${allQuestions.length}`;
        }

        function updateView() {
            const container = document.getElementById('exam-content');
            container.innerHTML = '';
            
            // تقسيم الأسئلة إلى مجموعات (كل مجموعة 12 سؤال)
            for (let i = 0; i < allQuestions.length; i += 12) {
                const chunk = allQuestions.slice(i, i + 12);
                container.innerHTML += createPage(chunk, i);
            }
        }

        function createPage(questions, startIndex) {
            let questionsHtml = '';
            questions.forEach((q, idx) => {
                questionsHtml += `
                    <div class="q-box">
                        <span class="q-text">${startIndex + idx + 1}. ${q.text}</span>
                        <div class="options-container">
                            <div class="option">أ) ${q.a}</div>
                            <div class="option">ج) ${q.c}</div>
                            <div class="option">ب) ${q.b}</div>
                            <div class="option">د) ${q.d}</div>
                        </div>
                    </div>
                `;
            });

            return `
                <div class="page">
                    <table class="header-table">
                        <tr>
                            <td width="30%">المملكة العربية السعودية<br>وزارة التعليم<br>تعليم الرياض<br>ثانوية الأمير عبدالمجيد</td>
                            <td width="40%"><img src="https://upload.wikimedia.org/wikipedia/ar/thumb/2/22/Ministry_of_Education_%28Saudi_Arabia%29_Logo.svg/1200px-Ministry_of_Education_%28Saudi_Arabia%29_Logo.svg.png" width="80"><br>اختبار الكفايات اللغوية</td>
                            <td width="30%">1447هـ<br>الدرجة: 40<br>الزمن: ساعتان ونصف</td>
                        </tr>
                    </table>
                    <div class="questions-grid">${questionsHtml}</div>
                </div>
            `;
        }

        function generatePDF() {
            const element = document.getElementById('exam-content');
            const opt = {
                margin: 0,
                filename: 'اختبار_الكفايات_أبو_نواف.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
