<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة اختبارات أ/ عبدالعزيز الفيفي</title>
    <style>
        /* إعدادات الطباعة النهائية */
        @media print {
            @page { margin: 0; size: A4; }
            body { margin: 0; padding: 0; background: white; }
            .controls, .delete-btn, .no-print { display: none !important; }
            .preview-area { background: white !important; padding: 0 !important; overflow: visible !important; display: block !important; }
            .word-page { 
                box-shadow: none !important; border: none !important; 
                width: 190mm !important; margin: 0 auto !important;
                padding: 10mm 5mm !important; transform: scale(1) !important;
            }
        }

        /* تنسيق الشاشة */
        body { font-family: 'Sakkal Majalla', 'Arial', sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; overflow: hidden; }
        .controls { width: 340px; padding: 20px; background: #fff; border-left: 2px solid #ddd; overflow-y: auto; flex-shrink: 0; }
        .config-box { background: #f0f7ff; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #b3d7ff; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #333; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 8px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: #28a745; }
        .btn-print { background: #17a2b8; }

        .preview-area { flex-grow: 1; padding: 20px; overflow-y: auto; background: #525659; display: flex; justify-content: center; align-items: flex-start; }
        .word-page { 
            width: 210mm; background: white; padding: 10mm;
            min-height: 285mm; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform: scale(0.82); transform-origin: top center; margin-bottom: 50px;
        }

        /* تنسيق الجدول والأسئلة */
        .header-table { width: 100%; border-collapse: collapse; }
        .header-table td { border: 1.5px solid black; padding: 4px; text-align: center; font-weight: bold; font-size: 13pt; line-height: 1.2; }
        .student-info { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .student-info td { border: 1.5px solid black; padding: 6px; font-weight: bold; font-size: 11pt; }
        .questions-grid { display: grid; grid-template-columns: 1fr 1fr; border-top: 2px solid black; border-right: 2px solid black; margin-top: 10px; }
        .q-box { border-bottom: 1.5px solid black; border-left: 1.5px solid black; padding: 10px; min-height: 115px; position: relative; }
        .q-num { display: inline-block; width: 22px; height: 22px; border: 1.5px solid black; text-align: center; line-height: 20px; font-weight: bold; background: #eee; margin-left: 8px; }
        
        /* عناوين الأنواع */
        .q-type-label { color: #d63031; font-size: 10pt; font-weight: bold; display: block; margin-bottom: 4px; border-bottom: 1px solid #eee; width: fit-content; }
        .context-box { background: #fdfdfd; border: 1px dashed #999; padding: 6px; margin: 5px 0; font-size: 11pt; border-radius: 4px; line-height: 1.4; }
        .answer-line { border-bottom: 1px dotted #000; height: 22px; margin-top: 8px; width: 90%; }

        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 8px; }
        .option { display: flex; align-items: center; font-size: 11pt; font-weight: bold; }
        .bubble { display: inline-block; width: 17px; height: 17px; border: 1.5px solid black; border-radius: 50%; text-align: center; line-height: 15px; margin-left: 6px; font-size: 9pt; }
        .delete-btn { color: red; cursor: pointer; font-size: 10px; float: left; border: 1px solid red; padding: 1px 3px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="controls">
        <h3 style="text-align:center; color:#007bff; margin-top:0;">إعداد اختبار أ/ عبدالعزيز</h3>
        <div class="config-box">
            <div class="input-group"><label>المدرسة</label><input type="text" id="cfgSchool" value="ثانوية الأمير عبدالمجيد" oninput="updatePreview()"></div>
            <div class="input-group"><label>المادة</label><input type="text" id="cfgSubject" value="الكفايات اللغوية" oninput="updatePreview()"></div>
            <div class="input-group"><label>المعلم</label><input type="text" id="cfgTeacher" value="عبدالعزيز الفيفي" oninput="updatePreview()"></div>
        </div>
        
        <div class="input-group">
            <label>نوع السؤال</label>
            <select id="qType" onchange="toggleInputs()">
                <option value="اختياري">1- اختياري</option>
                <option value="صح أو خطأ">2- صح أو خطأ</option>
                <option value="ضع في جملة مفيدة">3- في جملة مفيدة</option>
                <option value="أعرب ما تحته خط">4- أعرب ما تحته خط</option>
                <option value="استخرج من النص">5- استخرج من النص</option>
                <option value="أكمل الفراغ بما يناسبه">6- كمل الفراغ</option>
            </select>
        </div>

        <div id="contextArea" style="display:none;" class="input-group">
            <label id="contextLabel">النص أو الجملة الأساسية</label>
            <textarea id="qContext" rows="2" placeholder="اكتب النص هنا..."></textarea>
        </div>

        <div class="input-group"><label id="mainQLabel">نص السؤال / المطلوب</label><textarea id="qText" rows="2"></textarea></div>
        
        <div id="optsArea">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <input type="text" id="optA" placeholder="أ">
                <input type="text" id="optC" placeholder="ج">
                <input type="text" id="optB" placeholder="ب">
                <input type="text" id="optD" placeholder="د">
            </div>
        </div>
        
        <button class="btn btn-add" onclick="addQuestion()">+ إضافة السؤال</button>
        <hr>
        <button class="btn btn-print" onclick="window.print()">🖨️ طباعة الاختبار</button>
    </div>

    <div class="preview-area">
        <div class="word-page" id="capture-area">
            <table class="header-table" id="headerTbl"></table>
            <table class="student-info"><tr><td width="55%">اسم الطالب: .......................................</td><td width="20%">الصف: .......</td><td width="25%">رقم الجلوس: .......</td></tr></table>
            <div class="questions-grid" id="qGrid"></div>
            <div id="footerMsg" style="text-align:center; font-weight:bold; margin-top:20px; font-size:11pt;"></div>
        </div>
    </div>

    <script>
        let questions = [];

        function toggleInputs() {
            const type = document.getElementById('qType').value;
            document.getElementById('optsArea').style.display = (type === 'اختياري') ? 'block' : 'none';
            
            if (type === 'أعرب ما تحته خط' || type === 'استخرج من النص') {
                document.getElementById('contextArea').style.display = 'block';
                document.getElementById('contextLabel').innerText = (type === 'أعرب ما تحته خط') ? "الجملة المراد إعرابها:" : "النص المستخرج منه:";
                document.getElementById('mainQLabel').innerText = "الكلمة المطلوب إعرابها / استخراجها:";
            } else {
                document.getElementById('contextArea').style.display = 'none';
                document.getElementById('mainQLabel').innerText = (type === 'أكمل الفراغ بما يناسبه') ? "اكتب الجملة مع وضع نقاط (...):" : "نص السؤال:";
            }
        }
        
        function addQuestion() {
            const type = document.getElementById('qType').value;
            const text = document.getElementById('qText').value;
            const context = document.getElementById('qContext').value;
            if(!text) return;

            questions.push({ 
                type: type, 
                text: text, 
                context: context,
                a: document.getElementById('optA').value, 
                b: document.getElementById('optB').value, 
                c: document.getElementById('optC').value, 
                d: document.getElementById('optD').value 
            });
            updatePreview();
            document.getElementById('qText').value = '';
            document.getElementById('qContext').value = '';
        }

        function removeQ(i) { questions.splice(i, 1); updatePreview(); }

        function updatePreview() {
            const school = document.getElementById('cfgSchool').value;
            const subject = document.getElementById('cfgSubject').value;
            const teacher = document.getElementById('cfgTeacher').value;
            
            document.getElementById('headerTbl').innerHTML = `<tr><td width="30%">المملكة العربية السعودية<br>وزارة التعليم<br>تعليم الرياض<br>${school}</td><td width="40%">اختبار: ${subject}<br>للعام الدراسي: 1447هـ</td><td width="30%">الدرجة النهائية: 40<br>الزمن: ساعتان ونصف</td></tr>`;
            
            let qHtml = '';
            questions.forEach((q, i) => {
                let body = '';
                let label = `<span class="q-type-label">${q.type}:</span>`;

                if (q.type === 'اختياري') {
                    body = `<b>${q.text}</b><div class="options-container"><div class="option"><span class="bubble">أ</span>${q.a}</div><div class="option"><span class="bubble">ج</span>${q.c}</div><div class="option"><span class="bubble">ب</span>${q.b}</div><div class="option"><span class="bubble">د</span>${q.d}</div></div>`;
                } else if (q.type === 'صح أو خطأ') {
                    body = `<b>${q.text}</b><div class="options-container" style="margin-top:10px"><div class="option"><span class="bubble">✓</span> صح</div><div class="option"><span class="bubble">✗</span> خطأ</div></div>`;
                } else if (q.type === 'أعرب ما تحته خط' || q.type === 'استخرج من النص') {
                    body = `<div class="context-box">${q.context}</div><b>المطلوب:</b> ${q.text}<div class="answer-line"></div>`;
                } else {
                    // إكمال الفراغات والجمل المفيدة
                    body = `<b>${q.text}</b><div class="answer-line"></div>`;
                }

                qHtml += `<div class="q-box"><span class="delete-btn no-print" onclick="removeQ(${i})">حذف</span>${label}<div><span class="q-num">${i+1}</span>${body}</div></div>`;
            });
            document.getElementById('qGrid').innerHTML = qHtml;
            document.getElementById('footerMsg').innerText = `مع تمنياتنا لكم بالتوفيق.. معلم المادة: ${teacher}`;
        }
        updatePreview();
    </script>
</body>
</html>
