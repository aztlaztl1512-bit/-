<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة أبو نواف - النسخة الاحترافية النهائية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        
        * { box-sizing: border-box; }
        body { font-family: 'Amiri', serif; margin: 0; background-color: #e9ecef; }
        
        .no-print-area { background: #fff; padding: 20px; border-bottom: 4px solid #1a73e8; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, textarea, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; width: 100%; }
        .btn { padding: 12px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; }
        .btn-add { background: #1a73e8; }
        .btn-pdf { background: #d32f2f; margin-right: 10px; }
        
        /* إعدادات الصفحة - دقة متناهية */
        .page { 
            width: 210mm; 
            height: 296.5mm; /* طول A4 دقيق */
            padding: 12mm; 
            margin: 10px auto; 
            background: white; 
            position: relative;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .official-header { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .official-header td { border: 2px solid black; padding: 5px; text-align: center; font-weight: bold; font-size: 13pt; line-height: 1.4; }
        .student-info { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .student-info td { border: 2px solid black; padding: 8px; font-weight: bold; font-size: 11pt; }

        /* شبكة الأسئلة - تم رفع الارتفاع لتملأ الصفحة */
        .questions-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            border-top: 2.5px solid black; 
            border-right: 2.5px solid black;
        }
        .q-box { 
            border-bottom: 2px solid black; 
            border-left: 2px solid black; 
            padding: 12px; 
            height: 125px; /* رفع الارتفاع لتوزيع الأسئلة على كامل الصفحة */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .q-num { display: inline-block; width: 26px; height: 26px; border: 2px solid black; text-align: center; line-height: 24px; font-weight: bold; background: #eee; margin-left: 10px; }
        .q-text { font-weight: bold; font-size: 12.5pt; }
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .opt-item { display: flex; align-items: center; font-size: 11.5pt; font-weight: bold; }
        .bubble { display: inline-block; width: 22px; height: 22px; border: 1.8px solid black; border-radius: 50%; text-align: center; line-height: 20px; margin-left: 8px; font-size: 10pt; }

        @media print { 
            body { background: transparent; }
            .page { margin: 0; border: none; box-shadow: none; page-break-after: always; }
        }
    </style>
</head>
<body>

<div class="no-print-area">
    <div class="config-grid">
        <input type="text" id="cfgSchool" value="ثانوية الأمير عبدالمجيد">
        <input type="text" id="cfgSubject" value="الكفايات اللغوية">
        <input type="text" id="cfgYear" value="1447هـ">
        <input type="text" id="cfgTeacher" value="عبدالعزيز الفيفي">
    </div>
    <div style="display:flex; gap:10px; align-items:flex-end;">
        <select id="qType" onchange="document.getElementById('optInp').style.display=(this.value==='multi'?'flex':'none')" style="width:120px">
            <option value="multi">اختياري</option>
            <option value="tf">صح/خطأ</option>
        </select>
        <textarea id="qText" placeholder="نص السؤال..." style="flex:2; height:42px;"></textarea>
        <div id="optInp" style="display:flex; gap:5px;">
            <input type="text" id="optA" placeholder="أ" style="width:60px">
            <input type="text" id="optB" placeholder="ب" style="width:60px">
            <input type="text" id="optC" placeholder="ج" style="width:60px">
            <input type="text" id="optD" placeholder="د" style="width:60px">
        </div>
        <button class="btn btn-add" onclick="addQuestion()">إضافة</button>
        <button class="btn btn-pdf" onclick="generatePDF()">حفظ PDF (دقة 100%)</button>
    </div>
</div>

<div id="exam-container"></div>

<script>
    let questions = [];

    function addQuestion() {
        const text = document.getElementById('qText').value;
        if(!text) return;
        questions.push({
            type: document.getElementById('qType').value,
            text: text,
            a: document.getElementById('optA').value, b: document.getElementById('optB').value,
            c: document.getElementById('optC').value, d: document.getElementById('optD').value
        });
        renderExam();
        document.getElementById('qText').value = '';
    }

    function renderExam() {
        const container = document.getElementById('exam-container');
        container.innerHTML = '';
        const cfg = { school: document.getElementById('cfgSchool').value, subject: document.getElementById('cfgSubject').value, year: document.getElementById('cfgYear').value, teacher: document.getElementById('cfgTeacher').value };

        for (let i = 0; i < questions.length; i += 12) {
            const chunk = questions.slice(i, i + 12);
            container.innerHTML += createPage(chunk, i, cfg);
        }
    }

    function createPage(chunk, startIdx, cfg) {
        let qHtml = '';
        chunk.forEach((q, idx) => {
            let opts = q.type === 'multi' ? `
                <div class="options-container">
                    <div class="opt-item"><span class="bubble">أ</span>${q.a}</div><div class="opt-item"><span class="bubble">ج</span>${q.c}</div>
                    <div class="opt-item"><span class="bubble">ب</span>${q.b}</div><div class="opt-item"><span class="bubble">د</span>${q.d}</div>
                </div>` : `
                <div class="options-container">
                    <div class="opt-item"><span class="bubble">✓</span> صح</div><div class="opt-item"><span class="bubble">✗</span> خطأ</div>
                </div>`;
            qHtml += `<div class="q-box"><div><span class="q-num">${startIdx + idx + 1}</span><span class="q-text">${q.text}</span></div>${opts}</div>`;
        });

        // إذا كانت الأسئلة أقل من 12، نكمل المربعات فارغة للحفاظ على التنسيق
        while (chunk.length < 12) {
            qHtml += `<div class="q-box" style="border: 2px solid black; border-top:none; border-right:none;"></div>`;
            chunk.length++;
        }

        return `
            <div class="page">
                <table class="official-header">
                    <tr>
                        <td width="30%">المملكة العربية السعودية<br>وزارة التعليم<br>${cfg.school}</td>
                        <td width="40%"><img src="https://upload.wikimedia.org/wikipedia/ar/thumb/2/22/Ministry_of_Education_%28Saudi_Arabia%29_Logo.svg/1200px-Ministry_of_Education_%28Saudi_Arabia%29_Logo.svg.png" width="60"><br>اختبار مقرر: ${cfg.subject}</td>
                        <td width="30%">العام الدراسي: ${cfg.year}<br>الدرجة: 40<br>الزمن: ساعتان ونصف</td>
                    </tr>
                </table>
                <table class="student-info">
                    <tr><td>اسم الطالب: ...........................................................</td><td>الصف: ...........</td><td>رقم الجلوس: .......</td></tr>
                </table>
                <div class="questions-grid">${qHtml}</div>
                <div style="margin-top:10px; text-align:center; font-weight:bold; font-size:10pt;">مع تمنياتنا لكم بالتوفيق.. معلم المادة: ${cfg.teacher}</div>
            </div>`;
    }

    function generatePDF() {
        const element = document.getElementById('exam-container');
        const opt = {
            margin: 0,
            filename: 'اختبار_أبو_نواف_المحسن.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 3, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'css', after: '.page' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
