<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام اختبارات ثانوية الأمير عبدالمجيد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <style>
        /* إعدادات الطباعة الصارمة لضمان عدم الاختفاء */
        @media print {
            @page { 
                margin: 0; /* إلغاء الرابط والتاريخ تماماً */
                size: A4;
            }
            body { margin: 0; padding: 0; background: white; }
            .controls, .delete-btn, .no-print { display: none !important; }
            .preview-area { background: white !important; padding: 0 !important; display: block !important; }
            
            .word-page { 
                box-shadow: none !important; 
                border: none !important; 
                width: 190mm !important; /* تقليل العرض قليلاً لضمان بقائه داخل حدود الورقة */
                margin-left: auto !important;
                margin-right: auto !important;
                padding: 10mm 5mm !important; /* هوامش داخلية متوازنة */
                transform: scale(1) !important;
            }
            
            table, .questions-grid {
                width: 100% !important; /* تمدد الجداول لتملأ الـ 190 ملم */
            }
        }

        /* تنسيق الشاشة */
        body { font-family: 'Sakkal Majalla', 'Arial', sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; overflow: hidden; }
        .controls { width: 340px; padding: 20px; background: #fff; border-left: 2px solid #ddd; overflow-y: auto; flex-shrink: 0; }
        .config-box { background: #f0f7ff; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #b3d7ff; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 3px; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 8px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: #007bff; }
        .btn-print { background: #17a2b8; }

        .preview-area { flex-grow: 1; padding: 10px; overflow: hidden; background: #525659; display: flex; justify-content: center; align-items: flex-start; }
        .word-page { 
            width: 210mm; background: white; padding: 10mm;
            min-height: 285mm; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform: scale(0.75); transform-origin: top center;
        }

        /* تنسيق الجداول (مطابق للنماذج الرسمية) */
        .header-table { width: 100%; border-collapse: collapse; }
        .header-table td { border: 1.5px solid black; padding: 4px; text-align: center; font-weight: bold; font-size: 13pt; line-height: 1.2; }
        .student-info { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .student-info td { border: 1.5px solid black; padding: 6px; font-weight: bold; font-size: 11pt; }
        .questions-grid { display: grid; grid-template-columns: 1fr 1fr; border-top: 2px solid black; border-right: 2px solid black; margin-top: 10px; }
        .q-box { border-bottom: 1.5px solid black; border-left: 1.5px solid black; padding: 10px; min-height: 110px; position: relative; }
        .q-num { display: inline-block; width: 22px; height: 22px; border: 1.5px solid black; text-align: center; line-height: 20px; font-weight: bold; background: #eee; margin-left: 8px; }
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 10px; }
        .option { display: flex; align-items: center; font-size: 11pt; font-weight: bold; }
        .bubble { display: inline-block; width: 18px; height: 18px; border: 1.5px solid black; border-radius: 50%; text-align: center; line-height: 16px; margin-left: 6px; }
        .delete-btn { color: red; cursor: pointer; font-size: 10px; float: left; border: 1px solid red; padding: 1px 3px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="controls">
        <h3 style="text-align:center; color:#007bff; margin-top:0;">إعداد اختبار أ/ عبدالعزيز</h3>
        <div class="config-box">
            <div class="input-group"><label>المدرسة</label><input type="text" id="cfgSchool" value="ثانوية الأمير عبدالمجيد" oninput="updatePreview()"></div>
            <div class="input-group"><label>المادة</label><input type="text" id="cfgSubject" value="الكفايات اللغوية" oninput="updatePreview()"></div>
            <div class="input-group"><label>المعلم</label><input type="text" id="cfgTeacher" value="عبدالعزيز الفيفي" oninput="updatePreview()"></div>
        </div>
        <div class="input-group">
            <label>نوع الفقرة</label>
            <select id="qType" onchange="toggleInputs()"><option value="multi">اختياري</option><option value="tf">صح أو خطأ</option></select>
        </div>
        <div class="input-group"><label>نص السؤال</label><textarea id="qText" rows="2"></textarea></div>
        <div id="optsArea"><div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;"><input type="text" id="optA" placeholder="أ"><input type="text" id="optC" placeholder="ج"><input type="text" id="optB" placeholder="ب"><input type="text" id="optD" placeholder="د"></div></div>
        
        <button class="btn btn-add" onclick="addQuestion()">+ إضافة السؤال</button>
        <hr>
        <button class="btn btn-print" onclick="window.print()">🖨️ طباعة الاختبار</button>
    </div>

    <div class="preview-area">
        <div class="word-page" id="capture-area">
            <table class="header-table" id="headerTbl"></table>
            <table class="student-info"><tr><td width="55%">اسم الطالب: .......................................</td><td width="20%">الصف: .......</td><td width="25%">رقم الجلوس: .......</td></tr></table>
            <div class="questions-grid" id="qGrid"></div>
            <div id="footerMsg" style="text-align:center; font-weight:bold; margin-top:20px; font-size:11pt;"></div>
        </div>
    </div>

    <script>
        let questions = [];
        function toggleInputs() { document.getElementById('optsArea').style.display = (document.getElementById('qType').value === 'multi') ? 'block' : 'none'; }
        function addQuestion() {
            const txt = document.getElementById('qText').value;
            if(!txt) return;
            questions.push({ type: document.getElementById('qType').value, text: txt, a: document.getElementById('optA').value, b: document.getElementById('optB').value, c: document.getElementById('optC').value, d: document.getElementById('optD').value });
            updatePreview();
            document.getElementById('qText').value = '';
        }
        function removeQ(i) { questions.splice(i, 1); updatePreview(); }
        function updatePreview() {
            const school = document.getElementById('cfgSchool').value;
            const subject = document.getElementById('cfgSubject').value;
            const teacher = document.getElementById('cfgTeacher').value;
            document.getElementById('headerTbl').innerHTML = `<tr><td width="30%">المملكة العربية السعودية<br>وزارة التعليم<br>تعليم الرياض<br>${school}</td><td width="40%">اختبار: ${subject}<br>للعام الدراسي: 1447هـ</td><td width="30%">الدرجة النهائية: 40<br>الزمن: ساعتان ونصف</td></tr>`;
            let qHtml = '';
            questions.forEach((q, i) => {
                let opts = q.type === 'multi' ? `<div class="options-container"><div class="option"><span class="bubble">أ</span>${q.a}</div><div class="option"><span class="bubble">ج</span>${q.c}</div><div class="option"><span class="bubble">ب</span>${q.b}</div><div class="option"><span class="bubble">د</span>${q.d}</div></div>` : `<div class="options-container" style="margin-top:20px"><div class="option"><span class="bubble">✓</span> صح</div><div class="option"><span class="bubble">✗</span> خطأ</div></div>`;
                qHtml += `<div class="q-box"><span class="delete-btn" onclick="removeQ(${i})">حذف</span><div><span class="q-num">${i+1}</span><b>${q.text}</b></div>${opts}</div>`;
            });
            document.getElementById('qGrid').innerHTML = qHtml;
            document.getElementById('footerMsg').innerText = `مع تمنياتنا لكم بالتوفيق.. معلم المادة: ${teacher}`;
        }
        updatePreview();
    </script>
</body>
</html>
